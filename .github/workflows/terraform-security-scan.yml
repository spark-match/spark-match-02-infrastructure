###############################################################################
# CI - Terraform Security Scan (checkov)
###############################################################################
# Escaneo estatico de seguridad sobre el codigo Terraform usando checkov.
# Detecta:
#   - SGs con ingress 0.0.0.0/0
#   - S3 sin cifrado
#   - IAM policies con Action "*" sobre Resource "*"
#   - KMS sin key policy
#   - etc.
# Ref: IMPROVEMENTS.md [B7] [TF-05]
#
# trigger: pull_request contra dev o main, y workflow_dispatch manual.
# output: artefacto .sarif subido a GitHub code scanning + resumen en el log.
###############################################################################

name: CI - Terraform Security Scan

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write   # Para subir SARIF a code scanning

jobs:
  checkov:
    name: checkov (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - live/dev
          - live/prod
          - modules/security
          - modules/networking
          - modules/endpoints

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install checkov
        run: pip install --quiet "checkov==3.2.40"

      - name: Run checkov (JSON)
        working-directory: ${{ matrix.path }}
        run: |
          checkov \
            --directory . \
            --framework terraform \
            --output json \
            --output cli \
            --soft-fail \
            > $GITHUB_WORKSPACE/checkov-${{ matrix.path // '/' '-' }}.log 2>&1
          # soft-fail permite que el job continue aunque haya findings; el SARIF
          # igual se sube a code scanning para visibilidad.

      - name: Convert results to SARIF
        if: always()
        run: |
          python - <<'PY'
          import json
          import glob
          import os
          
          sarif_runs = []
          for log_path in glob.glob("$GITHUB_WORKSPACE/checkov-*.log"):
              try:
                  # El CLI output de checkov emite JSON despues de los logs de progreso.
                  # Extraer el primer JSON valido del archivo.
                  with open(log_path) as f:
                      content = f.read()
                  # Buscar el primer '{' seguido de un JSON valido.
                  start = content.find('\n{')
                  if start == -1:
                      continue
                  data = json.loads(content[start+1:])
                  
                  results = []
                  for check in data.get("results", {}).get("failed_checks", []):
                      file_path = check.get("file_path", "").replace("/home/runner/work/spark-match-02-infrastructure/spark-match-02-infrastructure/", "")
                      results.append({
                          "ruleId": check.get("check_id", "UNKNOWN"),
                          "level": "error" if check.get("severity") in ("HIGH", "CRITICAL") else "warning",
                          "message": {"text": check.get("check_name", "")},
                          "locations": [{
                              "physicalLocation": {
                                  "artifactLocation": {"uri": file_path},
                                  "region": {
                                      "startLine": check.get("file_line_range", [1])[0],
                                  }
                              }
                          }]
                      })
                  
                  sarif_runs.append({
                      "tool": {
                          "driver": {
                              "name": "checkov",
                              "version": "3.2.40",
                              "informationUri": "https://www.checkov.io/"
                          }
                      },
                      "results": results,
                  })
              except Exception as e:
                  print(f"Error procesando {log_path}: {e}")
          
          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": sarif_runs,
          }
          with open("$GITHUB_WORKSPACE/checkov-results.sarif", "w") as f:
              json.dump(sarif, f, indent=2)
          print(f"SARIF generado: {len(sarif_runs)} runs, {sum(len(r['results']) for r in sarif_runs)} findings")
          PY

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Summary
        if: always()
        run: |
          echo "### Checkov Security Scan" >> $GITHUB_STEP_SUMMARY
          for log in checkov-*.log; do
            if [ -f "$log" ]; then
              echo "**Path:** \`${{ matrix.path }}\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -E "Passed:|Failed:" "$log" 2>/dev/null | head -5 >> $GITHUB_STEP_SUMMARY || echo "Sin resultados" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-logs-${{ matrix.path // '/' '-' }}
          path: checkov-*.log
          retention-days: 30
