# =============================================================================
# CI - Terraform Plan (dev on PR, dev + prod on workflow_dispatch)
# =============================================================================
# Este workflow es un CALLER del reusable workflow en:
#   spark-match/spark-match-01-devops/.github/workflows/terraform-plan.yml
#
# Comportamiento:
#   - pull_request: solo corre Plan (dev) (Plan prod requiere trigger manual
#     para evitar exponer state de prod en PRs de cualquier contribuidor).
#   - workflow_dispatch: corre Plan (dev) y Plan (prod) para que el equipo
#     valide cambios contra prod antes de mergear a main.
#
# Para agregar un nuevo env (ej. staging):
#   1. Agregar entrada en la matrix.
#   2. Crear el GH Secret AWS_PLAN_ROLE_ARN_<ENV>.
#   3. Crear el bucket spark-match-tfstate-<env>.
#   4. Decidir si el env corre en PR (agregar a plan-pr) o solo dispatch
#     (agregar a plan-dispatch).
# =============================================================================

name: CI - Terraform Plan

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write     # Required by the reusable workflow for OIDC

jobs:
  # ---------------------------------------------------------------------------
  # Plan environments that are safe to expose in PRs.
  # Today: dev only. Add staging here if you create it later.
  # ---------------------------------------------------------------------------
  plan-pr:
    name: Plan (${{ matrix.environment }})
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            working-directory: live/dev
            backend-bucket: spark-match-tfstate-dev
            backend-key: dev/terraform.tfstate
            plan-role-arn-secret: AWS_PLAN_ROLE_ARN_DEV

    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-plan.yml@main
    secrets: inherit
    with:
      environment: ${{ matrix.environment }}
      working-directory: ${{ matrix.working-directory }}
      aws-region: us-east-1
      plan-role-arn-secret: ${{ matrix.plan-role-arn-secret }}
      terraform-version: '1.10.0'
      backend-bucket: ${{ matrix.backend-bucket }}
      backend-key: ${{ matrix.backend-key }}
      comment-on-pr: true

  # ---------------------------------------------------------------------------
  # Plan environments that should NOT be exposed in PRs (require manual
  # trigger). Today: prod only.
  # ---------------------------------------------------------------------------
  plan-dispatch:
    name: Plan (${{ matrix.environment }})
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            working-directory: live/dev
            backend-bucket: spark-match-tfstate-dev
            backend-key: dev/terraform.tfstate
            plan-role-arn-secret: AWS_PLAN_ROLE_ARN_DEV
          - environment: prod
            working-directory: live/prod
            backend-bucket: spark-match-tfstate-prod
            backend-key: prod/terraform.tfstate
            plan-role-arn-secret: AWS_PLAN_ROLE_ARN_PROD

    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-plan.yml@main
    secrets: inherit
    with:
      environment: ${{ matrix.environment }}
      working-directory: ${{ matrix.working-directory }}
      aws-region: us-east-1
      plan-role-arn-secret: ${{ matrix.plan-role-arn-secret }}
      terraform-version: '1.10.0'
      backend-bucket: ${{ matrix.backend-bucket }}
      backend-key: ${{ matrix.backend-key }}
      comment-on-pr: false   # No hay PR en workflow_dispatch
