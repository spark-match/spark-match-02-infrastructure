###############################################################################
# Dependabot configuration
###############################################################################
# Mantiene actualizadas las versiones de:
#   - GitHub Actions (terceros: hashicorp/setup-terraform, etc.) en workflows
#   - Terraform providers (hashicorp/aws, etc.) en archivos .terraform.lock.hcl
# Ref: IMPROVEMENTS.md [C13] [CI-09]
###############################################################################

version: 2

updates:
  # GitHub Actions: escanea workflows y reusable workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
    groups:
      # Agrupar updates menores/patch de Actions en un solo PR
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Limitar a 5 PRs abiertos simultaneamente para no saturar
    open-pull-requests-limit: 5

  # Terraform providers: escanea .terraform.lock.hcl en cada root/module
  - package-ecosystem: "terraform"
    directories:
      - "/live/dev"
      - "/live/prod"
      - "/modules/security"
      - "/modules/networking"
      - "/modules/endpoints"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "terraform"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3
